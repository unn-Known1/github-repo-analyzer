name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub python-dateutil pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 github_repo_analyzer --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 github_repo_analyzer --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test import
        run: |
          python -c "import github_repo_analyzer; print('Import successful, version:', github_repo_analyzer.__version__)"

      - name: Run tests with pytest
        run: |
          python -m pytest tests/ -v || echo "No tests directory found"
